---
- name: Check role/task parameters
  ansible.builtin.fail:
    msg: "Error: loop control variable 'idx' is not defined"
  when: idx is not defined

- name: Cleanup existing directories on FTP server
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ env.file_server.ftp_dir }}iso"
    - "{{ env.file_server.ftp_dir }}images"
  delegate_to: "{{ env.file_server.ip }}"
  remote_user: "{{ env.file_server.user }}"

- name: Create required directories on FTP server
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ env.file_server.ftp_dir }}iso"
    - "{{ env.file_server.ftp_dir }}images"
  delegate_to: "{{ env.file_server.ip }}"
  remote_user: "{{ env.file_server.user }}"

- name: Set 'boot_lpar_from_ftp_first_run' variable
  ansible.builtin.set_fact:
    boot_lpar_from_ftp_first_run: true

- name: Check to make sure that the KVM host has a corresponding inventory host_vars file named with matching hostname and .yaml extension.
  remote_user: "{{ env.file_server.user }}"
  delegate_to: "{{ env.file_server.ip }}"
  ansible.builtin.stat:
    path: "{{ env.file_server.ftp_dir }}iso/{{ rhcos_live_iso }}"
  register: rhcos_live_iso_file

- name: If not available, download Red Hat CoreOS ISO to HMC ftp server
  remote_user: "{{ env.file_server.user }}"
  delegate_to: "{{ env.file_server.ip }}"
  when: not rhcos_live_iso_file.stat.exists
  block:
    - name: If not available, download Red Hat CoreOS ISO to HMC ftp server
      ansible.builtin.get_url:
        url: "{{ item.baseurl }}{{ item.file }}"
        dest: "{{ env.file_server.ftp_dir }}iso/{{ item.file }}"
        mode: "0644"
      loop:
        - { baseurl: "{{ rhcos_download_url }}", file: "{{ rhcos_live_iso }}" }

    - name: Extract boot artifacts from ISO, e.g. {{ rhcos_live_kernel }}"
      ansible.builtin.shell: |
        set -e
        cd "{{ env.file_server.ftp_dir }}images"
        if 7z l "../iso/{{ rhcos_live_iso }}" | grep "images/pxeboot/kernel.img"; then
          7z e "../iso/{{ rhcos_live_iso }}" -so images/pxeboot/kernel.img > "{{ rhcos_live_kernel }}"
        else
          7z e "../iso/{{ rhcos_live_iso }}" -so images/pxeboot/vmlinuz > "{{ rhcos_live_kernel }}"
        fi
        7z e "../iso/{{ rhcos_live_iso }}" -so images/pxeboot/initrd.img > "{{ rhcos_live_initrd }}"
        7z e "../iso/{{ rhcos_live_iso }}" -so images/initrd.addrsize > "{{ rhcos_live_initrd }}.addrsize"

