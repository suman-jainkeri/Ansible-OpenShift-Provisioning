- name: Include LPAR host variablese
  ansible.builtin.include_vars:
    file: "{{ inventory_dir }}/host_vars/{{ parm_lpar_names[idx] }}.yaml"
    name: _host

- name: Update local variable
  ansible.builtin.set_fact:
    _hmc_load_from_ftp_ins_file: "{{ env.file_server.ftp_dir }}{{ _host.lpar.name | lower }}.ins"

- name: Create and upload prm file
  ansible.builtin.copy:
    dest: "{{ env.file_server.ftp_dir }}images/{{ _host.lpar.name | lower }}.prm"
    content: "{{ (_host.lpar_prm_config1 | join(' ') + ' ' + parm_lpar_prm_configs2[idx]) + '\n' }}"
    mode: "0644"
  remote_user: "{{ env.file_server.user }}"
  delegate_to: "{{ env.file_server.ip }}"

- name: Debug parm config1 and config2 file
  ansible.builtin.debug:
    var: _host.lpar_prm_config1, parm_lpar_prm_configs2[idx]

- name: Create and upload ins file from template
  ansible.builtin.template:
    src: "lpar_ins.j2"
    dest: "{{ env.file_server.ftp_dir }}{{ _host.lpar.name | lower }}.ins"
    mode: "0644"
  remote_user: "{{ env.file_server.user }}"
  delegate_to: "{{ env.file_server.ip }}"

- name: Show FTP directory tree structure
  ansible.builtin.shell: |
    tree -a "{{ env.file_server.ftp_dir }}"
  register: tree_output
  changed_when: false
  ignore_errors: true

- name: Print directory tree output
  ansible.builtin.debug:
    var: tree_output.stdout

- name: Lood classic mode task
  when: (_host.cpc_dpm_enabled is defined and not _host.cpc_dpm_enabled) or _host.cpc_dpm_enabled is not defined
  ansible.builtin.include_tasks: "classic_mode.yaml"

- name: Lood dpm mode task
  when: _host.cpc_dpm_enabled is defined and _host.cpc_dpm_enabled
  ansible.builtin.include_tasks: "dpm_mode.yaml"
